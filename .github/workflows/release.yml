name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Explicit semantic version to release, for example 0.2.1
        required: false
        type: string
      bump:
        description: Version bump to use when version is empty
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish_crates:
        description: Publish crates.io packages after the GitHub release is ready
        required: true
        default: true
        type: boolean
      notes:
        description: Optional extra release note text to prepend to the changelog section
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      existing_tag: ${{ steps.plan.outputs.existing_tag }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Plan release
        id: plan
        run: |
          python3 scripts/release.py \
            --version "${{ inputs.version }}" \
            --bump "${{ inputs.bump }}" \
            --notes "${{ inputs.notes }}" >> "$GITHUB_OUTPUT"

      - name: Run tests before tagging
        if: steps.plan.outputs.existing_tag != 'true'
        run: cargo test --workspace --locked

      - name: Commit release files
        if: steps.plan.outputs.existing_tag != 'true'
        run: |
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore(release): ${{ steps.plan.outputs.tag }}"

      - name: Create tag
        if: steps.plan.outputs.existing_tag != 'true'
        run: git tag "${{ steps.plan.outputs.tag }}"

      - name: Push commit and tag
        if: steps.plan.outputs.existing_tag != 'true'
        run: |
          git push origin HEAD
          git push origin "${{ steps.plan.outputs.tag }}"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.plan.outputs.tag }}" >/dev/null 2>&1; then
            echo "release already exists for ${{ steps.plan.outputs.tag }}"
          else
            gh release create "${{ steps.plan.outputs.tag }}" \
              --title "${{ steps.plan.outputs.tag }}" \
              --notes-file ".release-notes.md"
          fi

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: syft
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: syft
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: syft
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: syft.exe
            archive: zip

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --locked -p syft-cli --target ${{ matrix.target }}

      - name: Package archive on unix
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          ASSET_DIR="syft-${VERSION}-${TARGET}"
          mkdir -p "dist/${ASSET_DIR}"
          cp "target/${TARGET}/release/${BINARY}" "dist/${ASSET_DIR}/${BINARY}"
          cp README.md "dist/${ASSET_DIR}/README.md"
          tar -C dist -czf "dist/${ASSET_DIR}.tar.gz" "${ASSET_DIR}"

      - name: Package archive on windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          $assetDir = "syft-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist\$assetDir" | Out-Null
          Copy-Item "target\$env:TARGET\release\$env:BINARY" "dist\$assetDir\$env:BINARY"
          Copy-Item "README.md" "dist\$assetDir\README.md"
          Compress-Archive -Path "dist\$assetDir\*" -DestinationPath "dist\$assetDir.zip" -Force

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/*

  upload-assets:
    name: Upload Release Assets
    needs:
      - prepare
      - build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS.txt

      - name: Upload assets with clobber
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt --clobber

  publish-crates:
    name: Publish Crates.io Packages
    if: ${{ inputs.publish_crates }}
    needs:
      - prepare
      - upload-assets
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Require crates.io token
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is required when publish_crates is true" >&2
            exit 1
          fi

      - name: Publish crates in order with retries
        run: |
          set -euo pipefail

          is_published() {
            curl -fsSI "https://crates.io/api/v1/crates/$1/$VERSION/download" >/dev/null 2>&1
          }

          publish() {
            local package="$1"
            local attempt

            if is_published "$package"; then
              echo "$package $VERSION is already published, skipping"
              return 0
            fi

            for attempt in 1 2 3 4 5; do
              if cargo publish --locked -p "$package" --token "$CARGO_REGISTRY_TOKEN"; then
                echo "published $package $VERSION"
                sleep 30
                return 0
              fi
              echo "publish attempt ${attempt} for ${package} failed"
              sleep 30
              if is_published "$package"; then
                echo "$package $VERSION showed up after retry delay, continuing"
                return 0
              fi
            done

            echo "failed to publish $package after multiple attempts" >&2
            return 1
          }

          publish syft-types
          publish syft-store
          publish syft-objects
          publish syft-git
          publish syft-semantic
          publish syft-validate
          publish syft-core
          publish syft-cli
