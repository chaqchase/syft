name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read crate version
        id: version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == "syft-cli"))')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "Tag $TAG does not match workspace version v${VERSION}" >&2
            exit 1
          fi

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: syft
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: syft
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: syft
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: syft.exe

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p syft-cli --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          ASSET_DIR="syft-${VERSION}-${TARGET}"
          mkdir -p "dist/${ASSET_DIR}"
          cp "target/${TARGET}/release/${BINARY}" "dist/${ASSET_DIR}/${BINARY}"
          cp README.md "dist/${ASSET_DIR}/README.md"
          tar -C dist -czf "dist/${ASSET_DIR}.tar.gz" "${ASSET_DIR}"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          $assetDir = "syft-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist\$assetDir" | Out-Null
          Copy-Item "target\$env:TARGET\release\$env:BINARY" "dist\$assetDir\$env:BINARY"
          Copy-Item "README.md" "dist\$assetDir\README.md"
          Compress-Archive -Path "dist\$assetDir\*" -DestinationPath "dist\$assetDir.zip" -Force

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/*

  upload-release-assets:
    name: Upload Release Assets
    needs:
      - verify-version
      - build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS.txt

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.tag }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt

  publish-crates:
    name: Publish Crates.io Packages
    needs:
      - verify-version
      - upload-release-assets
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Skip publish when token is missing
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not set, skipping crates.io publish"

      - name: Publish workspace crates
        if: env.CARGO_REGISTRY_TOKEN != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish() {
            local package="$1"
            local attempt
            for attempt in 1 2 3 4 5; do
              if cargo publish --locked -p "$package" --token "$CARGO_REGISTRY_TOKEN"; then
                sleep 30
                return 0
              fi
              echo "publish attempt ${attempt} for ${package} failed, retrying after index delay"
              sleep 30
            done
            echo "failed to publish ${package} after multiple attempts" >&2
            return 1
          }

          publish syft-types
          publish syft-store
          publish syft-objects
          publish syft-git
          publish syft-semantic
          publish syft-validate
          publish syft-core
          publish syft-cli
