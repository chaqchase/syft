name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Explicit semantic version to release, for example 0.2.1
        required: false
        type: string
      bump:
        description: Version bump to use when version is empty
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish_crates:
        description: Publish crates.io packages after the GitHub release is ready
        required: true
        default: true
        type: boolean
      notes:
        description: Optional extra release note text to prepend to the changelog section
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  GH_REPO: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      existing_tag: ${{ steps.plan.outputs.existing_tag }}
      head_sha: ${{ steps.tag-state.outputs.head_sha }}
      retag_required: ${{ steps.tag-state.outputs.retag_required }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Plan release
        id: plan
        run: |
          python3 scripts/release.py \
            --version "${{ inputs.version }}" \
            --bump "${{ inputs.bump }}" \
            --notes "${{ inputs.notes }}" >> "$GITHUB_OUTPUT"

      - name: Check current tag target
        id: tag-state
        run: |
          head_sha="$(git rev-parse HEAD)"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

          if git rev-parse "${{ steps.plan.outputs.tag }}" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "${{ steps.plan.outputs.tag }}")"
            if [ "$tag_sha" = "$head_sha" ]; then
              echo "retag_required=false" >> "$GITHUB_OUTPUT"
            else
              echo "retag_required=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "retag_required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check crates.io publish state
        id: crates-state
        run: |
          version="${{ steps.plan.outputs.version }}"
          published_any=false

          for package in \
            syft-types \
            syft-store \
            syft-objects \
            syft-git \
            syft-semantic \
            syft-validate \
            syft-core \
            syft-cli
          do
            if curl -fsSI "https://crates.io/api/v1/crates/${package}/${version}/download" >/dev/null 2>&1; then
              echo "${package}@${version} is already published"
              published_any=true
            fi
          done

          echo "published_any=${published_any}" >> "$GITHUB_OUTPUT"

      - name: Refuse retag when crates are already published
        if: steps.tag-state.outputs.retag_required == 'true' && steps.crates-state.outputs.published_any == 'true'
        run: |
          echo "Some crates for version ${{ steps.plan.outputs.version }} are already published on crates.io." >&2
          echo "Reusing that version on a different commit would leave the release inconsistent." >&2
          echo "Choose a new semantic version and run the workflow again." >&2
          exit 1

      - name: Refresh lockfile for release version
        if: steps.plan.outputs.existing_tag != 'true'
        run: cargo generate-lockfile

      - name: Run tests before tagging
        if: steps.plan.outputs.existing_tag != 'true'
        run: cargo test --workspace --locked

      - name: Commit release files
        if: steps.plan.outputs.existing_tag != 'true'
        run: |
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore(release): ${{ steps.plan.outputs.tag }}"

      - name: Create tag
        if: steps.plan.outputs.existing_tag != 'true'
        run: git tag "${{ steps.plan.outputs.tag }}"

      - name: Push commit and tag
        if: steps.plan.outputs.existing_tag != 'true'
        run: |
          git push origin HEAD
          git push origin "${{ steps.plan.outputs.tag }}"

      - name: Move existing tag to current commit
        if: steps.plan.outputs.existing_tag == 'true' && steps.tag-state.outputs.retag_required == 'true'
        run: |
          git tag -f "${{ steps.plan.outputs.tag }}"
          git push origin HEAD
          git push origin "refs/tags/${{ steps.plan.outputs.tag }}" --force

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.plan.outputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.plan.outputs.tag }}" \
              --title "${{ steps.plan.outputs.tag }}" \
              --target "${{ steps.tag-state.outputs.head_sha }}"
          else
            gh release create "${{ steps.plan.outputs.tag }}" \
              --title "${{ steps.plan.outputs.tag }}" \
              --notes-file ".release-notes.md"
          fi

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: syft
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: syft
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: syft
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: syft.exe
            archive: zip

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --locked -p syft-cli --target ${{ matrix.target }}

      - name: Package archive on unix
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          ASSET_DIR="syft-${VERSION}-${TARGET}"
          mkdir -p "dist/${ASSET_DIR}"
          cp "target/${TARGET}/release/${BINARY}" "dist/${ASSET_DIR}/${BINARY}"
          cp README.md "dist/${ASSET_DIR}/README.md"
          tar -C dist -czf "dist/${ASSET_DIR}.tar.gz" "${ASSET_DIR}"

      - name: Package archive on windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          $assetDir = "syft-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist\$assetDir" | Out-Null
          Copy-Item "target\$env:TARGET\release\$env:BINARY" "dist\$assetDir\$env:BINARY"
          Copy-Item "README.md" "dist\$assetDir\README.md"
          Compress-Archive -Path "dist\$assetDir\*" -DestinationPath "dist\$assetDir.zip" -Force

      - name: Upload packaged binary to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no packaged assets found" >&2
            exit 1
          fi
          gh release upload "${{ needs.prepare.outputs.tag }}" "${assets[@]}" --clobber

  finalize-release:
    name: Finalize Release Assets
    needs:
      - prepare
      - build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --pattern 'syft-*.tar.gz' \
            --pattern 'syft-*.zip' \
            --dir dist

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS.txt

      - name: Upload checksums with clobber
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" dist/SHA256SUMS.txt --clobber

  publish-crates:
    name: Publish Crates.io Packages
    if: ${{ inputs.publish_crates }}
    needs:
      - prepare
      - finalize-release
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Require crates.io token
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is required when publish_crates is true" >&2
            exit 1
          fi

      - name: Publish crates in order with retries
        run: |
          set -euo pipefail

          is_published() {
            curl -fsSI "https://crates.io/api/v1/crates/$1/$VERSION/download" >/dev/null 2>&1
          }

          retry_sleep_from_log() {
            local log_file="$1"
            local retry_after
            local retry_epoch
            local now_epoch
            local wait_seconds

            retry_after="$(
              sed -n 's/.*Please try again after \(.* GMT\).*/\1/p' "$log_file" | tail -n 1
            )"

            if [ -z "$retry_after" ]; then
              echo 90
              return 0
            fi

            retry_epoch="$(date -u -d "$retry_after" +%s 2>/dev/null || true)"
            if [ -z "$retry_epoch" ]; then
              echo 90
              return 0
            fi

            now_epoch="$(date -u +%s)"
            wait_seconds=$((retry_epoch - now_epoch + 5))
            if [ "$wait_seconds" -lt 15 ]; then
              wait_seconds=15
            fi

            echo "$wait_seconds"
          }

          publish_succeeded_elsewhere() {
            local log_file="$1"
            grep -q "already exists on crates.io index" "$log_file"
          }

          publish() {
            local package="$1"
            local attempt
            local log_file
            local sleep_seconds

            if is_published "$package"; then
              echo "$package $VERSION is already published, skipping"
              return 0
            fi

            for attempt in 1 2 3 4 5; do
              log_file="$(mktemp)"
              if cargo publish --locked -p "$package" >"$log_file" 2>&1; then
                cat "$log_file"
                echo "published $package $VERSION"
                sleep 90
                return 0
              fi

              cat "$log_file"
              echo "publish attempt ${attempt} for ${package} failed"

              if publish_succeeded_elsewhere "$log_file"; then
                echo "$package $VERSION is already published, continuing"
                return 0
              fi

              if is_published "$package"; then
                echo "$package $VERSION showed up after retry delay, continuing"
                return 0
              fi

              sleep_seconds="$(retry_sleep_from_log "$log_file")"
              echo "sleeping ${sleep_seconds}s before retrying ${package}"
              sleep "$sleep_seconds"
            done

            echo "failed to publish $package after multiple attempts" >&2
            return 1
          }

          publish syft-types
          publish syft-store
          publish syft-objects
          publish syft-git
          publish syft-semantic
          publish syft-validate
          publish syft-core
          publish syft-cli
